<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>المدرّب الذكي — جيمك</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B1120" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<link rel="stylesheet" href="fonts.css" />

<style>
  :root{
    --bg-deep:#0B1120;
    --card-glass:rgba(255,255,255,0.045);
    --border-soft:rgba(255,255,255,0.09);
    --text-primary:#F8FAFC;
    --text-secondary:#94A3B8;
    --text-dim:#64748B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg-deep); height:100%;}
  body{font-family:'Tajawal','Cairo',sans-serif; color:var(--text-primary); min-height:100vh; display:flex; flex-direction:column;}
  h1,h2,h3,.cairo{font-family:'Cairo','Tajawal',sans-serif;}

  .bg-ambient{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(700px 420px at 12% -8%, rgba(37,99,235,0.32), transparent 60%),
      radial-gradient(650px 500px at 105% 10%, rgba(124,58,237,0.28), transparent 60%),
      var(--bg-deep);
  }

  .glass{
    background:var(--card-glass); border:1px solid var(--border-soft); border-radius:18px;
    backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
  }

  /* ===== Top bar ===== */
  .top-bar{
    display:flex; align-items:center; gap:12px; padding:16px 14px;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .back-btn{
    width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.045); border:1px solid var(--border-soft); flex-shrink:0;
  }
  .coach-avatar{
    width:38px; height:38px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#2563EB,#7C3AED);
  }
  .coach-meta{flex:1;}
  .coach-title{font-size:14px; font-weight:800; margin:0;}
  .coach-status{font-size:10.5px; color:#4ADE80; font-weight:600; display:flex; align-items:center; gap:4px;}
  .status-dot{width:6px; height:6px; border-radius:50%; background:#4ADE80; box-shadow:0 0 6px #4ADE80;}

  /* ===== Chat body ===== */
  .chat-body{flex:1; overflow-y:auto; padding:16px 14px 10px; max-width:480px; margin:0 auto; width:100%; box-sizing:border-box;}

  .msg-row{display:flex; gap:9px; margin-bottom:14px; align-items:flex-end;}
  .msg-row.me{flex-direction:row-reverse;}
  .msg-ic{
    width:28px; height:28px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#2563EB,#7C3AED);
  }
  .msg-bubble{
    max-width:78%; padding:11px 14px; border-radius:16px; font-size:13px; line-height:1.7; white-space:pre-line;
  }
  .msg-row:not(.me) .msg-bubble{
    background:var(--card-glass); border:1px solid var(--border-soft); border-bottom-right-radius:4px; color:var(--text-primary);
  }
  .msg-row.me .msg-bubble{
    background:linear-gradient(135deg,#2563EB,#7C3AED); border-bottom-left-radius:4px; color:#fff;
  }

  /* ===== Suggestion card inside chat ===== */
  .suggest-card{
    padding:14px; margin-top:6px; margin-right:37px;
    background:linear-gradient(120deg, rgba(37,99,235,0.12), rgba(124,58,237,0.08));
  }
  .suggest-head{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  .suggest-title{font-size:12.5px; font-weight:800;}
  .suggest-days{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
  .sg-day{font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:20px; background:rgba(255,255,255,0.06); color:var(--text-secondary);}
  .suggest-actions{display:flex; gap:8px;}
  .sg-btn{
    flex:1; text-align:center; padding:8px 0; font-size:11.5px; font-weight:800; border-radius:12px;
  }
  .sg-btn.primary{color:#fff; background:linear-gradient(135deg,#2563EB,#7C3AED);}
  .sg-btn.ghost{color:var(--text-secondary); background:rgba(255,255,255,0.05); border:1px solid var(--border-soft);}

  /* ===== Quick prompts ===== */
  .quick-prompts{display:flex; gap:8px; overflow-x:auto; padding:10px 14px; scrollbar-width:none;}
  .quick-prompts::-webkit-scrollbar{display:none;}
  .qp-chip{
    flex-shrink:0; font-size:11.5px; font-weight:700; padding:9px 14px; border-radius:20px;
    background:var(--card-glass); border:1px solid var(--border-soft); color:var(--text-secondary);
    white-space:nowrap; display:flex; align-items:center; gap:6px;
  }

  /* ===== Input bar ===== */
  .input-bar{
    display:flex; align-items:center; gap:10px; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    max-width:480px; margin:0 auto; width:100%; box-sizing:border-box;
  }
  .input-field{
    flex:1; display:flex; align-items:center; padding:12px 16px; border-radius:22px;
  }
  .input-field input{
    flex:1; background:none; border:none; outline:none; color:var(--text-primary); font-family:'Tajawal',sans-serif; font-size:13px;
  }
  .input-field input::placeholder{color:var(--text-dim);}
  .send-btn{
    width:44px; height:44px; border-radius:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#2563EB,#7C3AED); box-shadow:0 8px 20px rgba(37,99,235,0.35);
  }
</style>
</head>
<body>
<div class="bg-ambient"></div>

<div class="top-bar">
  <a href="profile.html" class="back-btn" style="text-decoration:none;" aria-label="رجوع">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14 6-6 6 6 6"/></svg>
  </a>
  <div class="coach-avatar">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 0-4 4v1a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4Z"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/><path d="M9 10.5s1 1 3 1 3-1 3-1"/></svg>
  </div>
  <div class="coach-meta">
    <p class="coach-title" data-i18n="ai_title">المدرّب الذكي</p>
    <div class="coach-status"><span class="status-dot"></span><span data-i18n="ai_status">متصل الآن</span></div>
  </div>
</div>

<div class="chat-body" id="chatBody"></div>
<template id="botMsgTpl">
  <div class="msg-row">
    <div class="msg-ic">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 0-4 4v1a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4Z"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/></svg>
    </div>
    <div class="msg-bubble"></div>
  </div>
</template>

<div class="quick-prompts" id="quickPrompts">
  <div class="qp-chip" data-q="اقترح برنامج">📋 اقترح برنامج جديد</div>
  <div class="qp-chip" data-q="احسبلي سعرات: 2 بيضة ورغيف عيش بلدي وكوب لبن">🍳 احسبلي سعرات وجبة</div>
  <div class="qp-chip" data-q="نصايح غذائية">🍽️ نصايح غذائية</div>
  <div class="qp-chip" data-q="حلل تقدمي">📊 حلل تقدمي</div>
  <div class="qp-chip" data-q="عدّل هدفي">🎯 عدّل هدفي</div>
</div>

<div class="input-bar">
  <div class="glass input-field">
    <input type="text" id="chatInput" placeholder="اسأل مدربك الذكي..." data-i18n-ph="ai_input_ph" />
  </div>
  <div class="send-btn" id="sendBtn" style="cursor:pointer;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 14-7-7 14-2-5-5-2Z"/></svg>
  </div>
</div>

<script src="app-data.js"></script>
<script>
  const store = window.GymakStore;
  const chatBody = document.getElementById("chatBody");
  const tpl = document.getElementById("botMsgTpl");

  function addBotMsg(text) {
    const node = tpl.content.cloneNode(true);
    node.querySelector(".msg-bubble").textContent = text;
    chatBody.appendChild(node);
    chatBody.scrollTop = chatBody.scrollHeight;
  }
  function addMeMsg(text) {
    const row = document.createElement("div");
    row.className = "msg-row me";
    row.innerHTML = `<div class="msg-bubble"></div>`;
    row.querySelector(".msg-bubble").textContent = text;
    chatBody.appendChild(row);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function fmt(n){ return Number(n).toLocaleString('en-US', {maximumFractionDigits:1}); }
  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  function welcomeMessage() {
    const streak = store.getStreak();
    const progress = store.getStrengthProgress(1)[0];
    const profile = store.getProfile();
    const namePart = profile.name ? `يا ${profile.name}` : "";
    if (streak >= 3 && progress) {
      return `أهلاً ${namePart}! مكمّل ${streak} يوم متتالي، وقوتك في ${progress.name} زادت من ${progress.from} لـ ${progress.to} كجم. حابب أساعدك في إيه النهاردة؟`;
    }
    if (streak >= 1) {
      return `أهلاً ${namePart}! مكمّل ${streak} يوم متتالي، استمر كده. حابب أساعدك في إيه؟`;
    }
    return `أهلاً ${namePart}! دوّن أول تمرين أو وزن عشان أقدر أحلل تقدمك وأساعدك أكتر. حابب أساعدك في إيه؟`;
  }

  function findExerciseByName(text) {
    const all = store.getExercises();
    const norm = (s) => s.toLowerCase().trim();
    return all.find((ex) => norm(text).includes(norm(ex.name))) || null;
  }

  function answerFor(q) {
    const text = q.toLowerCase().trim();
    const profile = store.getProfile();

    // ===== Greetings / thanks =====
    if (/^(أهلا|اهلا|هاي|هلا|صباح|مساء|hi|hello)/.test(text)) {
      return pick([
        "أهلاً بيك! جاهز نشتغل على تمرينك النهاردة؟",
        "هاي! حابب أساعدك في البرنامج، الأكل، ولا تحليل تقدمك؟",
      ]);
    }
    if (text.includes("شكرا") || text.includes("متشكر") || text.includes("thanks")) {
      return "العفو! أنا موجود أي وقت محتاجني، كمّل كده 💪";
    }

    // ===== Food / calorie calculation =====
    const foodTriggerWords = ["سعرات", "احسب", "إحسب", "اكلت", "أكلت", "هاكل", "فطار", "فطاري", "غدا", "غدائي", "عشا", "عشائي", "وجبة", "كام سعرة"];
    const hasFoodTrigger = foodTriggerWords.some((w) => text.includes(w));
    const foodItems = store.parseFood(q);
    if (hasFoodTrigger || foodItems.length >= 2) {
      if (!foodItems.length) {
        return "اكتبلي الأكلات بوضوح زي: \"فطاري 2 بيضة ورغيف عيش بلدي وكوب لبن\" وأنا هحسبلك السعرات والبروتين تلقائي.";
      }
      const dayEntry = store.logFoodEntries(foodItems);
      const target = store.getDailyCalorieTarget();
      const breakdown = foodItems.map((it) => `• ${it.name} (${it.grams}جم) — ${it.kcal} سعرة`).join("\n");
      const mealKcal = foodItems.reduce((a, i) => a + i.kcal, 0);
      let msg = `حسبتلك الوجبة دي:\n${breakdown}\n\nإجمالي الوجبة: ${mealKcal} سعرة (بروتين ${foodItems.reduce((a, i) => a + i.protein, 0).toFixed(1)} جم)\n\nإجمالي سعراتك النهاردة: ${dayEntry.totalKcal} سعرة`;
      if (target) {
        const remaining = target - dayEntry.totalKcal;
        msg += remaining >= 0 ? ` من أصل ${target} — باقيلك ${remaining} سعرة.` : ` من أصل ${target} — زودت ${Math.abs(remaining)} سعرة عن هدفك.`;
      } else {
        msg += `. سجّل وزنك من الصفحة الرئيسية عشان أقدرلك أحدد هدف سعرات يومي دقيق.`;
      }
      return msg;
    }

    // ===== Ask about a specific exercise by name =====
    const foundEx = findExerciseByName(text);
    if (foundEx && (text.includes("ازاي") || text.includes("طريقة") || text.includes("إزاي") || text.includes("اداء") || text.includes("أداء"))) {
      const last = store.getLastExerciseLog(foundEx.id);
      let msg = `${foundEx.name} بيستهدف ${foundEx.muscleLabel}${foundEx.secondary ? " ومعاه " + foundEx.secondary : ""}. الرينج المقترح ${foundEx.sets}×${foundEx.reps}.`;
      if (last) msg += ` آخر مرة سجلت ${last.weight} كجم بـ ${last.sets}×${last.reps}.`;
      msg += " تقدر تشوف خطوات الأداء بالتفصيل في صفحة التمرين نفسه.";
      return msg;
    }

    // ===== Program =====
    if (text.includes("برنامج")) {
      const active = store.getActiveProgram();
      if (active) return `عندك حاليًا برنامج ${active.name} مطبّق (${active.daysPerWeek}). لو عايز تغيّره ادخل على "برامج التدريب الجاهزة" من صفحة حسابي.`;
      const recId = store.getRecommendedProgramId();
      const recProg = recId ? store.getPrograms().find((p) => p.id === recId) : null;
      if (recProg) return `لسه ما اخترتش برنامج. بناءً على بياناتك أقترحلك تجرب "${recProg.name}" (${recProg.daysPerWeek})، تقدر تطبّقه من "برامج التدريب الجاهزة" في صفحة حسابي.`;
      return `لسه ما اخترتش برنامج تدريب. تقدر تختار واحد من "برامج التدريب الجاهزة" في صفحة حسابي حسب مستواك وعدد أيامك المتاحة.`;
    }

    // ===== Nutrition / protein =====
    if (text.includes("أكل") || text.includes("اكل") || text.includes("غذائ") || text.includes("تغذية") || text.includes("بروتين") || text.includes("دايت")) {
      const latest = store.getLatestWeight();
      if (latest) {
        const protein = Math.round(latest.weight * 1.8);
        const cutting = text.includes("تنشيف") || text.includes("خس") || text.includes("نزل وزن");
        const bulking = text.includes("تضخيم") || text.includes("زياد") || text.includes("بلك");
        let extra = "";
        if (cutting) extra = " ولو هدفك تنشيف، خلي عجز السعرات معقول (300-500 سعرة تحت احتياجك) عشان محتفظش بالعضل.";
        if (bulking) extra = " ولو هدفك تضخيم، زوّد 250-400 سعرة فوق احتياجك مع تدريب مقاومة منتظم.";
        return `بوزنك الحالي (${fmt(latest.weight)} كجم)، هدف بروتين معقول يوميًا حوالي ${protein} جم. وزّعه على 3-4 وجبات، وخلي الكارب حوالين وقت التمرين.${extra}`;
      }
      return "سجّل وزنك الأول من الصفحة الرئيسية عشان أقدر أحسبلك احتياجك من البروتين بدقة.";
    }

    // ===== Injury / pain — safe, non-diagnostic guidance =====
    if (text.includes("وجع") || text.includes("ألم") || text.includes("الم ") || text.includes("إصاب") || text.includes("اصاب")) {
      return "لو حاسس بألم فعلي (مش مجرد تعب عضلي عادي)، وقف التمرين اللي بيوجعك فورًا ولا تكمل عليه. الراحة والثلج بيساعدوا في أول 48 ساعة، ولو الألم استمر أو كان قوي، لازم تشوف دكتور عظام أو مختص علاج طبيعي بدل ما تكمل تمرين. أنا مش بديل عن استشارة طبية.";
    }

    // ===== Motivation =====
    if (text.includes("كسل") || text.includes("مش قادر") || text.includes("تعبان") || text.includes("motivation") || text.includes("مش عايز اكمل")) {
      const streak = store.getStreak();
      if (streak >= 1) return `إنت فعلاً مكمّل ${streak} يوم متتالي، متكسرش السلسلة دلوقتي. جرب تمرين خفيف اليوم بدل ما تسيبه خالص، أحسن من إنك توقف كليًا.`;
      return "كل بطل بدأ بيوم واحد بس. مش لازم تمرين قوي، ابدأ بربع ساعة بسيطة وسجلها هنا، وهتلاقي نفسك عايز تكمل.";
    }

    // ===== Sleep / recovery =====
    if (text.includes("نوم") || text.includes("راحة") || text.includes("recovery")) {
      return "النوم من أهم عوامل بناء العضل — حاول تاخد 7-8 ساعات، وخلي بين كل تمرين لنفس العضلة يوم أو يومين راحة على الأقل عشان تسترجع صح.";
    }

    // ===== Progress analysis =====
    if (text.includes("حلل") || text.includes("تقدم") || text.includes("إحصائ") || text.includes("احصائ")) {
      const streak = store.getStreak();
      const best = store.getBestStreak();
      const tonnage = Math.round(store.getTonnage(30));
      const top = store.getStrengthProgress(1)[0];
      const bmi = store.getBMI();
      let msg = `ستريكك الحالي ${streak} يوم (أعلى رقم ${best}). إجمالي الأوزان المرفوعة آخر 30 يوم: ${fmt(tonnage)} كجم.`;
      if (top) msg += ` أكتر تمرين تحسّن فيه: ${top.name} (${top.pct > 0 ? "+" : ""}${top.pct}%).`;
      if (bmi) msg += ` مؤشر كتلة جسمك حاليًا ${bmi}.`;
      return msg;
    }

    // ===== Goal weight =====
    if (text.includes("هدف")) {
      const current = store.getGoalWeight();
      const val = prompt("اكتب وزنك المستهدف (كجم):", current || "");
      if (val && !isNaN(parseFloat(val))) {
        store.setGoalWeight(parseFloat(val));
        return `تمام، هدفك الجديد هو ${fmt(parseFloat(val))} كجم. هتلاقيه محدث في الصفحة الرئيسية.`;
      }
      return "محدّش أي تغيير في الهدف.";
    }

    // ===== Weight trend =====
    if (text.includes("وزن")) {
      const diff = store.getWeightDiffOverDays(7);
      if (diff) return `وزنك اتغيّر ${diff.diff > 0 ? "+" : ""}${diff.diff} كجم آخر أسبوع (من ${diff.from} لـ ${diff.to}).`;
      return "سجّل وزنك أكتر من مرة عشان أقدر أتابع تغيّره معاك.";
    }

    // ===== Achievements =====
    if (text.includes("انجاز") || text.includes("إنجاز") || text.includes("مستوى") || text.includes("لفل") || text.includes("level")) {
      const ach = store.getAchievements();
      const unlocked = ach.filter((a) => a.unlocked).length;
      return `فاتح ${unlocked} من ${ach.length} إنجاز لحد دلوقتي، وإنت في المستوى ${profile.level}. كمّل تسجيل تمارينك عشان تفتح الباقي.`;
    }

    return pick([
      "تقدر تسألني عن: البرنامج، النصايح الغذائية، تحليل تقدمك، تعديل هدف الوزن، أو حتى ازاي تأدي تمرين معين.",
      "أنا هنا أساعدك في التمرين، الأكل، أو أي سؤال عن تقدمك — قولي محتاج إيه بالظبط؟",
    ]);
  }

  function handleUserText(q) {
    if (!q.trim()) return;
    addMeMsg(q);
    setTimeout(() => addBotMsg(answerFor(q)), 300);
  }

  document.getElementById("quickPrompts").addEventListener("click", (e) => {
    const chip = e.target.closest(".qp-chip");
    if (!chip) return;
    handleUserText(chip.dataset.q);
  });

  document.getElementById("sendBtn").addEventListener("click", () => {
    const input = document.getElementById("chatInput");
    handleUserText(input.value);
    input.value = "";
  });
  document.getElementById("chatInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("sendBtn").click();
  });

  store.applyI18n();
  addBotMsg(welcomeMessage());
  store.scheduleReminder();

  if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }
</script>
</body>
</html>
