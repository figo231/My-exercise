<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>التمارين — جيمك</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#F5F5F7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<link rel="stylesheet" href="fonts.css" />

<style>
  :root{
    --bg-deep:#F5F5F7;
    --card-glass:rgba(255,255,255,0.55);
    --border-soft:rgba(17,24,39,0.08);
    --text-primary:#111827;
    --text-secondary:#6B7280;
    --text-dim:#9CA3AF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg-deep);}
  body{font-family:'Tajawal','Cairo',sans-serif; color:var(--text-primary); min-height:100vh;}
  h1,h2,h3,.cairo{font-family:'Cairo','Tajawal',sans-serif;}

  .bg-ambient{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(700px 420px at 12% -8%, rgba(255,107,44,0.20), transparent 60%),
      radial-gradient(650px 500px at 105% 10%, rgba(255,148,87,0.20), transparent 60%),
      var(--bg-deep);
  }
  .app{max-width:480px; margin:0 auto; padding:16px 14px 100px;}

  .glass{
    background:var(--card-glass); border:1px solid var(--border-soft); border-radius:24px;
    backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 8px 26px rgba(17,24,39,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
    position:relative;
  }

  /* ===== Page header ===== */
  .page-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .page-title{font-size:19px; font-weight:900; margin:0;}
  .page-count{font-size:11.5px; color:var(--text-dim); font-weight:600; margin-top:2px;}
  .add-btn{
    width:42px; height:42px; border-radius:14px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#FF6B2C,#FF9457); box-shadow:0 6px 18px rgba(255,107,44,0.22);
  }

  /* ===== Search ===== */
  .search-bar{
    display:flex; align-items:center; gap:9px; padding:11px 14px; margin-bottom:14px;
  }
  .search-bar input{
    flex:1; background:none; border:none; outline:none; color:var(--text-primary);
    font-family:'Tajawal',sans-serif; font-size:13.5px;
  }
  .search-bar input::placeholder{color:var(--text-dim);}

  /* ===== Filter chips ===== */
  .filters{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; font-size:12px; font-weight:700; padding:7px 15px; border-radius:20px;
    background:var(--card-glass); border:1px solid var(--border-soft); color:var(--text-secondary);
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .chip .dot{width:7px; height:7px; border-radius:50%; box-shadow:0 0 6px currentColor;}
  .chip.active{
    color:#FF6B2C; background:linear-gradient(135deg, rgba(255,107,44,0.22), rgba(255,148,87,0.22));
    border-color:rgba(255,178,130,0.25);
  }

  /* muscle colors */
  .m-chest{color:#FF7A3D;} .m-back{color:#22C55E;} .m-shoulders{color:#FFA35E;}
  .m-legs{color:#F59E0B;} .m-arms{color:#EC4899;} .m-core{color:#14B8A6;}

  /* ===== Exercise card ===== */
  .ex-card{
    display:flex; align-items:center; gap:12px; padding:10px 12px; margin-bottom:6px;
  }
  .ex-thumb{
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 35% 30%, rgba(17,24,39,0.065), rgba(17,24,39,0.02));
    border:1px solid var(--border-soft);
  }
  .ex-thumb svg{width:26px; height:26px;}
  .ex-info{flex:1; min-width:0;}
  .ex-name{font-weight:700; font-size:14px; margin:0 0 4px;}
  .ex-tags{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .badge{
    font-size:10px; font-weight:700; padding:2.5px 8px; border-radius:20px; display:inline-flex; align-items:center; gap:4px;
  }
  .badge.primary{background:rgba(255,107,44,0.10); color:#FFC9A3;}
  .badge.secondary{background:rgba(17,24,39,0.055); color:var(--text-dim);}
  .ex-meta{text-align:left; flex-shrink:0;}
  .ex-sets{font-size:11.5px; font-weight:800; color:var(--text-primary);}
  .ex-last{font-size:10px; color:var(--text-dim); margin-top:2px;}
  .chev{color:var(--text-dim);}

  /* ===== Group header ===== */
  .group-head{
    display:flex; align-items:center; gap:8px; margin:14px 4px 7px;
    font-size:13px; font-weight:800; color:var(--text-secondary);
  }
  .group-head .dot{width:8px; height:8px; border-radius:50%; box-shadow:0 0 6px currentColor;}
  .group-count{font-size:11px; color:var(--text-dim); font-weight:600; margin-right:auto;}

  /* ===== Bottom nav (same as home) ===== */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    display:flex; justify-content:center; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(11,17,32,0.95) 60%, rgba(11,17,32,0));
  }
  .bottom-nav-inner{
    max-width:480px; width:100%; display:flex; justify-content:space-between;
    background:rgba(20,27,46,0.75); border:1px solid var(--border-soft);
    border-radius:26px; padding:8px 10px; backdrop-filter:blur(20px);
    box-shadow:0 10px 30px rgba(17,24,39,0.12);
  }
  .nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:6px 2px; border-radius:14px; color:#64748B; font-size:10px; font-weight:700;
    text-decoration:none;
  }
  .nav-item svg{width:21px; height:21px;}
  .nav-item.active{color:#FF6B2C; background:linear-gradient(135deg, rgba(255,107,44,0.22), rgba(255,148,87,0.20));}
</style>
</head>
<body>
<div class="bg-ambient"></div>
<div class="app">

  <div class="page-head">
    <div>
      <h1 class="page-title" data-i18n="ex_title">التمارين</h1>
      <div class="page-count" id="pageCount">— تمرين</div>
    </div>
    <div class="add-btn" id="addExBtn" style="cursor:pointer;">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </div>
  </div>

  <div class="glass active-program-banner" id="activeProgramBanner" style="display:none; align-items:center; gap:10px; padding:11px 14px; margin-bottom:14px;">
    <div style="width:34px;height:34px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FF6B2C,#FF9457);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:10.5px;color:var(--text-dim);font-weight:700;" data-i18n="ex_active_program">البرنامج الحالي</div>
      <div id="activeProgramName" style="font-size:13px;font-weight:800;">—</div>
      <div id="activeProgramDays" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;"></div>
    </div>
    <a href="programs.html" data-i18n="ex_change_program" style="text-decoration:none;font-size:11px;font-weight:800;color:#FFC9A3;background:rgba(147,197,253,0.12);padding:6px 10px;border-radius:12px;flex-shrink:0;">تغيير</a>
  </div>

  <div class="glass search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="دور على تمرين..." data-i18n-ph="ex_search_ph" />
  </div>

  <div class="filters" id="filterBar">
    <div class="chip active" data-muscle="all" data-i18n="ex_filter_all">الكل</div>
    <div class="chip" data-muscle="chest"><span class="dot" style="background:#FF7A3D;color:#FF7A3D"></span><span data-i18n="ex_filter_chest">صدر</span></div>
    <div class="chip" data-muscle="back"><span class="dot" style="background:#22C55E;color:#22C55E"></span><span data-i18n="ex_filter_back">ظهر</span></div>
    <div class="chip" data-muscle="shoulders"><span class="dot" style="background:#FFA35E;color:#FFA35E"></span><span data-i18n="ex_filter_shoulders">أكتاف</span></div>
    <div class="chip" data-muscle="legs"><span class="dot" style="background:#F59E0B;color:#F59E0B"></span><span data-i18n="ex_filter_legs">أرجل</span></div>
    <div class="chip" data-muscle="arms"><span class="dot" style="background:#EC4899;color:#EC4899"></span><span data-i18n="ex_filter_arms">ذراعين</span></div>
    <div class="chip" data-muscle="core"><span class="dot" style="background:#14B8A6;color:#14B8A6"></span><span data-i18n="ex_filter_core">بطن</span></div>
  </div>

  <div class="page-count" style="text-align:center;margin-bottom:8px;opacity:.7;" data-i18n="ex_delete_hint">اضغط مطوّل على أي تمرين لحذفه</div>

  <div id="exerciseList"></div>

  <div id="emptyState" style="display:none; text-align:center; padding:40px 20px; color:var(--text-dim);">
    <p style="font-size:13px;" data-i18n="ex_empty">مفيش تمارين في القسم ده لسه.<br/>دوس على + فوق عشان تضيف تمرين جديد.</p>
  </div>


</div>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>
      <span data-i18n="nav_home">الرئيسية</span>
    </a>
    <a href="exercises.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 2v4M16 2v4M4 10h16"/></svg>
      <span data-i18n="nav_exercises">التمارين</span>
    </a>
    <a href="stats.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M10 19v-8M16 19V9M22 19V3"/></svg>
      <span data-i18n="nav_stats">الإحصائيات</span>
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>
      <span data-i18n="nav_profile">حسابي</span>
    </a>
  </div>
</div>

<!-- ===== Add exercise modal ===== -->
<div id="addExOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(3px); display:none; align-items:flex-end; z-index:100;">
  <div class="glass" style="width:100%; max-width:480px; margin:0 auto; border-radius:24px 24px 0 0; padding:20px; padding-bottom:calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;">
    <div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:4px;margin:0 auto 16px;"></div>
    <h3 style="font-size:15px; font-weight:800; margin:0 0 16px;" data-i18n="ex_add_title">إضافة تمرين جديد</h3>

    <label style="font-size:11px; color:var(--text-dim); font-weight:700; display:block; margin-bottom:6px;" data-i18n="ex_add_name_label">اسم التمرين</label>
    <input id="newExName" type="text" placeholder="مثال: سكوات بار" style="width:100%; box-sizing:border-box; background:rgba(17,24,39,0.045); border:1px solid var(--border-soft); border-radius:12px; padding:11px 12px; color:#111827; font-family:'Tajawal',sans-serif; font-size:14px; margin-bottom:14px;" />

    <label style="font-size:11px; color:var(--text-dim); font-weight:700; display:block; margin-bottom:6px;" data-i18n="ex_add_muscle_label">العضلة الأساسية</label>
    <div id="muscleSelectRow" style="display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px;">
      <div class="chip ms-opt active" data-m="chest"><span class="dot" style="background:#FF7A3D;color:#FF7A3D"></span>صدر</div>
      <div class="chip ms-opt" data-m="back"><span class="dot" style="background:#22C55E;color:#22C55E"></span>ظهر</div>
      <div class="chip ms-opt" data-m="shoulders"><span class="dot" style="background:#FFA35E;color:#FFA35E"></span>أكتاف</div>
      <div class="chip ms-opt" data-m="legs"><span class="dot" style="background:#F59E0B;color:#F59E0B"></span>أرجل</div>
      <div class="chip ms-opt" data-m="arms"><span class="dot" style="background:#EC4899;color:#EC4899"></span>ذراعين</div>
      <div class="chip ms-opt" data-m="core"><span class="dot" style="background:#14B8A6;color:#14B8A6"></span>بطن</div>
    </div>

    <label style="font-size:11px; color:var(--text-dim); font-weight:700; display:block; margin-bottom:6px;" data-i18n="ex_add_secondary_label">عضلات مساعدة (اختياري)</label>
    <input id="newExSecondary" type="text" placeholder="مثال: ترايسبس" style="width:100%; box-sizing:border-box; background:rgba(17,24,39,0.045); border:1px solid var(--border-soft); border-radius:12px; padding:11px 12px; color:#111827; font-family:'Tajawal',sans-serif; font-size:14px; margin-bottom:14px;" />

    <div style="display:flex; gap:10px; margin-bottom:16px;">
      <div style="flex:1;">
        <label style="font-size:11px; color:var(--text-dim); font-weight:700; display:block; margin-bottom:6px;" data-i18n="ex_add_sets_label">مجموعات</label>
        <input id="newExSets" type="number" value="3" style="width:100%; box-sizing:border-box; background:rgba(17,24,39,0.045); border:1px solid var(--border-soft); border-radius:12px; padding:11px 12px; color:#111827; font-family:'Tajawal',sans-serif; font-size:14px;" />
      </div>
      <div style="flex:1;">
        <label style="font-size:11px; color:var(--text-dim); font-weight:700; display:block; margin-bottom:6px;" data-i18n="ex_add_reps_label">تكرارات</label>
        <input id="newExReps" type="number" value="10" style="width:100%; box-sizing:border-box; background:rgba(17,24,39,0.045); border:1px solid var(--border-soft); border-radius:12px; padding:11px 12px; color:#111827; font-family:'Tajawal',sans-serif; font-size:14px;" />
      </div>
    </div>

    <div style="display:flex; gap:10px;">
      <div id="addExCancel" style="flex:1; text-align:center; padding:12px 0; border-radius:14px; font-weight:700; font-size:13px; color:var(--text-secondary); background:rgba(17,24,39,0.045); border:1px solid var(--border-soft);" data-i18n="ex_add_cancel">إلغاء</div>
      <div id="addExSave" style="flex:1; text-align:center; padding:12px 0; border-radius:14px; font-weight:800; font-size:13px; color:#fff; background:linear-gradient(135deg,#FF6B2C,#FF9457);" data-i18n="ex_add_save">إضافة التمرين</div>
    </div>
  </div>
</div>

<script src="app-data.js"></script>
<script>
  const store = window.GymakStore;
  let activeMuscleFilter = "all";
  let searchQuery = "";

  function genericThumbSVG(color) {
    return `<svg viewBox="0 0 32 32" width="24" height="24">
      <rect x="3" y="13.5" width="5.5" height="5" rx="1.4" fill="${color}" opacity=".9"/>
      <rect x="23.5" y="13.5" width="5.5" height="5" rx="1.4" fill="${color}" opacity=".9"/>
      <rect x="8.5" y="15.1" width="15" height="1.8" rx=".9" fill="${color}" opacity=".55"/>
    </svg>`;
  }

  function cardHTML(ex) {
    const meta = store.getMuscleMeta(ex.muscle);
    const last = store.getLastExerciseLog(ex.id);
    const setsLabel = last ? (last.sets + "×" + last.reps) : (ex.sets + "×" + ex.reps);
    const lastLabel = last ? ("آخر مرة " + last.weight + " كجم") : "لسه ما اتسجلش";
    return `
    <a href="exercise-detail.html?id=${encodeURIComponent(ex.id)}" class="glass ex-card" data-ex-id="${ex.id}" data-ex-name="${ex.name.replace(/"/g, '&quot;')}" style="text-decoration:none;color:inherit;">
      <div class="ex-thumb">${genericThumbSVG(meta.color)}</div>
      <div class="ex-info">
        <p class="ex-name">${ex.name}</p>
        <div class="ex-tags">
          <span class="badge primary">${ex.muscleLabel}</span>
          ${ex.secondary ? `<span class="badge secondary">${ex.secondary}</span>` : ""}
        </div>
      </div>
      <div class="ex-meta">
        <div class="ex-sets">${setsLabel}</div>
        <div class="ex-last">${lastLabel}</div>
      </div>
      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
    </a>`;
  }

  // ===== Long-press to delete any exercise (flexible list, user's own choice) =====
  (function setupLongPressDelete() {
    let pressTimer = null;
    let longPressFired = false;
    let startX = 0, startY = 0;
    const listEl = document.getElementById("exerciseList");

    function cancelPress() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    }

    function confirmDelete(card) {
      const id = card.dataset.exId;
      const name = card.dataset.exName;
      const msg = store.getLang() === "en" ? `Delete "${name}"?` : `تحذف "${name}" نهائيًا من قائمة تمارينك؟`;
      if (confirm(msg)) {
        store.deleteExercise(id);
        renderExercises();
      }
    }

    listEl.addEventListener("pointerdown", (e) => {
      const card = e.target.closest(".ex-card");
      if (!card) return;
      longPressFired = false;
      startX = e.clientX; startY = e.clientY;
      pressTimer = setTimeout(() => {
        longPressFired = true;
        if (navigator.vibrate) navigator.vibrate(25);
        confirmDelete(card);
      }, 550);
    });
    listEl.addEventListener("pointermove", (e) => {
      if (!pressTimer) return;
      if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) cancelPress();
    });
    ["pointerup", "pointerleave", "pointercancel"].forEach((ev) => listEl.addEventListener(ev, cancelPress));
    listEl.addEventListener("click", (e) => {
      if (longPressFired) { e.preventDefault(); longPressFired = false; }
    });
  })();

  // ===== Active program banner =====
  function renderActiveProgramBanner() {
    const active = store.getActiveProgram();
    const banner = document.getElementById("activeProgramBanner");
    if (!active) { banner.style.display = "none"; return; }
    banner.style.display = "flex";
    document.getElementById("activeProgramName").textContent = active.name;
    document.getElementById("activeProgramDays").innerHTML = active.dayChips
      .map((c) => `<span style="font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(17,24,39,0.055);color:var(--text-secondary);">${c}</span>`)
      .join("");
  }

  function updateCount() {
    const all = store.getExercises();
    const muscles = new Set(all.map((ex) => ex.muscle));
    document.getElementById("pageCount").textContent = `${all.length} تمرين · ${muscles.size} مجموعات عضلية`;
  }

  function renderExercises() {
    updateCount();
    const all = store.getExercises();
    const filtered = all.filter((ex) => {
      const matchMuscle = activeMuscleFilter === "all" || ex.muscle === activeMuscleFilter;
      const matchSearch = !searchQuery || ex.name.toLowerCase().includes(searchQuery.toLowerCase());
      return matchMuscle && matchSearch;
    });

    const listEl = document.getElementById("exerciseList");
    const emptyEl = document.getElementById("emptyState");

    if (!filtered.length) {
      listEl.innerHTML = "";
      emptyEl.style.display = "block";
      return;
    }
    emptyEl.style.display = "none";

    // group by muscle
    const groups = {};
    filtered.forEach((ex) => {
      if (!groups[ex.muscle]) groups[ex.muscle] = [];
      groups[ex.muscle].push(ex);
    });

    let html = "";
    Object.keys(groups).forEach((muscle) => {
      const meta = store.getMuscleMeta(muscle);
      const items = groups[muscle];
      html += `<div class="group-head">
        <span class="dot" style="background:${meta.color};color:${meta.color}"></span>
        ${meta.label}
        <span class="group-count">${items.length} تمرين</span>
      </div>`;
      items.forEach((ex) => { html += cardHTML(ex); });
    });
    listEl.innerHTML = html;
  }

  // ===== Filters =====
  document.getElementById("filterBar").addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    document.querySelectorAll("#filterBar .chip").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");
    activeMuscleFilter = chip.dataset.muscle;
    renderExercises();
  });

  // ===== Search =====
  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchQuery = e.target.value;
    renderExercises();
  });

  // ===== Add exercise modal =====
  const addOverlay = document.getElementById("addExOverlay");
  let selectedMuscle = "chest";

  document.getElementById("addExBtn").addEventListener("click", () => {
    document.getElementById("newExName").value = "";
    document.getElementById("newExSecondary").value = "";
    document.getElementById("newExSets").value = 3;
    document.getElementById("newExReps").value = 10;
    selectedMuscle = "chest";
    document.querySelectorAll(".ms-opt").forEach((c) => c.classList.toggle("active", c.dataset.m === "chest"));
    addOverlay.style.display = "flex";
  });
  document.getElementById("addExCancel").addEventListener("click", () => { addOverlay.style.display = "none"; });
  addOverlay.addEventListener("click", (e) => { if (e.target === addOverlay) addOverlay.style.display = "none"; });

  document.getElementById("muscleSelectRow").addEventListener("click", (e) => {
    const chip = e.target.closest(".ms-opt");
    if (!chip) return;
    document.querySelectorAll(".ms-opt").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");
    selectedMuscle = chip.dataset.m;
  });

  document.getElementById("addExSave").addEventListener("click", () => {
    const name = document.getElementById("newExName").value.trim();
    if (!name) { document.getElementById("newExName").focus(); return; }
    store.addExercise({
      name,
      muscle: selectedMuscle,
      secondary: document.getElementById("newExSecondary").value.trim(),
      sets: document.getElementById("newExSets").value,
      reps: document.getElementById("newExReps").value,
    });
    addOverlay.style.display = "none";
    renderExercises();
  });

  store.applyI18n();
  renderActiveProgramBanner();
  renderExercises();
  store.scheduleReminder();

  if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }
</script>
</body>
</html>
