<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>متتبع الجيم</title>

<!-- PWA / Add to Home Screen -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B1120" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gym Tracker" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<style>
  html, body { margin: 0; padding: 0; background: #0B1120; }

  /* Splash screen: shown instantly on launch, hidden once the app has painted */
  #splash-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #16213e 0%, #0B1120 55%);
    transition: opacity 0.45s ease, visibility 0.45s ease;
  }
  #splash-screen.splash-hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #splash-screen .splash-logo {
    width: 96px;
    height: 96px;
    border-radius: 24px;
    box-shadow: 0 0 0 1px rgba(37,99,235,0.3), 0 0 40px rgba(124,58,237,0.25), 0 12px 40px rgba(0,0,0,0.5);
    animation: splash-pop 0.6s cubic-bezier(.22,1,.36,1) both;
  }
  #splash-screen .splash-name {
    margin-top: 18px;
    font-family: 'Cairo', 'Tajawal', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #F8FAFC;
    letter-spacing: 0.5px;
    animation: splash-fade-up 0.6s ease 0.1s both;
  }
  #splash-screen .splash-tagline {
    margin-top: 6px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: #94A3B8;
    animation: splash-fade-up 0.6s ease 0.18s both;
  }
  #splash-screen .splash-dots {
    margin-top: 28px;
    display: flex;
    gap: 6px;
    animation: splash-fade-up 0.6s ease 0.26s both;
  }
  #splash-screen .splash-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2563EB;
    animation: splash-blink 1.1s ease-in-out infinite;
  }
  #splash-screen .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
  #splash-screen .splash-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes splash-pop {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes splash-fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes splash-blink {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>

<!-- Self-hosted fonts: works fully offline, no dependency on fonts.googleapis.com -->
<link rel="stylesheet" href="fonts.css" />

<!-- Tailwind utility classes used by the app, pre-built as a local file
     (no CDN / no internet needed — works fully offline) -->
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="theme-light.css" />

<!-- Apply saved theme before paint, so there's no flash of the wrong theme -->
<script>
  if (localStorage.getItem("theme") === "light") {
    document.documentElement.classList.add("light");
  }
</script>
</head>
<body>
<div id="splash-screen">
  <img src="icon-512.png" alt="جيمك" class="splash-logo" />
  <div class="splash-name">جيمك</div>
  <div class="splash-tagline">جسمك، تمارينك، تقدمك</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="root"></div>

<!-- React + ReactDOM + the app are all bundled into this one file.
     No CDN, no internet needed after the first visit. -->
<script src="app.bundle.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>

<!-- Hide the splash screen once the app has actually rendered into #root
     (with a small minimum display time so it never just "flashes"). -->
<script>
  (function () {
    var MIN_SPLASH_MS = 500;
    var start = Date.now();
    var splash = document.getElementById("splash-screen");
    var root = document.getElementById("root");

    function hideSplash() {
      if (!splash) return;
      var elapsed = Date.now() - start;
      var wait = Math.max(0, MIN_SPLASH_MS - elapsed);
      setTimeout(function () {
        splash.classList.add("splash-hide");
        setTimeout(function () { splash.remove(); }, 500);
      }, wait);
    }

    var obs = new MutationObserver(function () {
      if (root && root.children.length > 0) {
        obs.disconnect();
        hideSplash();
      }
    });
    obs.observe(root, { childList: true });

    // Safety net: never let the splash screen get stuck forever
    setTimeout(hideSplash, 4000);
  })();
</script>

<!-- Fix: whenever a bottom-sheet modal (exercise management, settings, etc.)
     gets added to the page, make sure its inner panel starts scrolled to the
     very top, so the header and first button are always visible immediately. -->
<script>
  (function () {
    var obs = new MutationObserver(function (mutations) {
      mutations.forEach(function (m) {
        m.addedNodes.forEach(function (node) {
          if (node.nodeType !== 1) return;
          var overlay = node.matches && node.matches(".fixed.inset-0")
            ? node
            : (node.querySelector ? node.querySelector(".fixed.inset-0") : null);
          if (overlay) {
            var panel = overlay.querySelector(".overflow-y-auto") || overlay.firstElementChild;
            if (panel) panel.scrollTop = 0;
            window.scrollTo(0, 0);
          }
        });
      });
    });
    obs.observe(document.getElementById("root"), { childList: true, subtree: true });
  })();
</script>
</body>
</html>
