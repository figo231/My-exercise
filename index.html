<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Simulation</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050505;
      overflow: hidden;
      color: white;
      height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.95));
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00ff99, #00ccff, #ff0033);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 5px #00ff99);
      }
      to {
        filter: drop-shadow(0 0 20px #ff0033);
      }
    }

    .terminal {
      width: 95%;
      max-width: 800px;
      height: 350px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(0,255,170,0.4);
      border-radius: 15px;
      padding: 20px;
      overflow: hidden;
      text-align: right;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 25px rgba(0,255,170,0.2);
    }

    .line {
      font-size: 16px;
      margin-bottom: 10px;
      color: #00ff99;
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .warning {
      margin-top: 20px;
      font-size: 22px;
      color: #ff4444;
      display: none;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    .prank {
      margin-top: 25px;
      display: none;
      font-size: 26px;
      color: #ffffff;
      background: rgba(255,255,255,0.08);
      padding: 15px 25px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      z-index: 2;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 30px;
      }

      .terminal {
        height: 300px;
      }

      .line {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="overlay"></div>

<div class="content">
  <div class="title">محاكاة نظام إلكتروني</div>

  <div class="terminal" id="terminal"></div>

  <div class="warning" id="warning">
    جاري تحليل النظام...
  </div>

  <div class="prank" id="prank">
    😂 دي مجرد محاكاة للهزار وبس 😂
  </div>

  <div class="footer">
    CYBER SIMULATION UI
  </div>
</div>

<audio id="beep" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>
  const terminal = document.getElementById('terminal');
  const warning = document.getElementById('warning');
  const prank = document.getElementById('prank');
  const beep = document.getElementById('beep');

  const lines = [
    'بدء تشغيل النظام...',
    'فحص الاتصال...',
    'تحميل البيانات الوهمية...',
    'تحليل الملفات...',
    'جاري فحص الشبكة...',
    'اكتشاف النظام...',
    'محاكاة الوصول...',
    'تشغيل بروتوكول الحماية...',
    'فحص الأمان...',
    'اكتمل التحليل الوهمي بنجاح.'
  ];

  let index = 0;

  function addLine() {
    if(index < lines.length) {
      const div = document.createElement('div');
      div.classList.add('line');
      div.textContent = '> ' + lines[index];
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;

      beep.currentTime = 0;
      beep.play().catch(() => {});

      index++;
      setTimeout(addLine, 1200);
    } else {
      warning.style.display = 'block';

      setTimeout(() => {
        prank.style.display = 'block';
      }, 4000);
    }
  }

  addLine();

  // MATRIX EFFECT
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = '01アカサタナハマヤャラワガザダバパ';
  const fontSize = 16;
  const columns = canvas.width / fontSize;

  const drops = [];

  for(let i = 0; i < columns; i++) {
    drops[i] = 1;
  }

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];

      const colors = ['#00ff99','#00ccff','#ff0033'];
      ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      ctx.font = fontSize + 'px monospace';

      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(draw, 35);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
