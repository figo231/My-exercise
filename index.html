<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>متتبع الجيم</title>

<!-- PWA / Add to Home Screen -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0D0F12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gym Tracker" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<style>
  html, body { margin: 0; padding: 0; background: #0B0D10; }
</style>

<!-- Tailwind utility classes used by the app, pre-built as a local file
     (no CDN / no internet needed — works fully offline) -->
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="theme-light.css" />

<!-- Apply saved theme before paint, so there's no flash of the wrong theme -->
<script>
  if (localStorage.getItem("theme") === "light") {
    document.documentElement.classList.add("light");
  }
</script>
</head>
<body>
<div id="root"></div>

<!-- React + ReactDOM + the app are all bundled into this one file.
     No CDN, no internet needed after the first visit. -->
<script src="app.bundle.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>

<!-- Dark/Light mode toggle button (sits on top of the app, doesn't touch app.bundle.js) -->
<button id="theme-toggle-btn" aria-label="تبديل الوضع الداكن/الفاتح">🌙</button>
<script>
  (function () {
    var btn = document.getElementById("theme-toggle-btn");
    function sync() {
      var isLight = document.documentElement.classList.contains("light");
      btn.textContent = isLight ? "☀️" : "🌙";
    }
    btn.addEventListener("click", function () {
      document.documentElement.classList.toggle("light");
      var isLight = document.documentElement.classList.contains("light");
      localStorage.setItem("theme", isLight ? "light" : "dark");
      sync();
    });
    sync();
  })();
</script>

<!-- Fix: whenever a bottom-sheet modal (exercise management, settings, etc.)
     gets added to the page, make sure its inner panel starts scrolled to the
     very top, so the header and first button are always visible immediately. -->
<script>
  (function () {
    var obs = new MutationObserver(function (mutations) {
      mutations.forEach(function (m) {
        m.addedNodes.forEach(function (node) {
          if (node.nodeType !== 1) return;
          var overlay = node.matches && node.matches(".fixed.inset-0")
            ? node
            : (node.querySelector ? node.querySelector(".fixed.inset-0") : null);
          if (overlay) {
            var panel = overlay.querySelector(".overflow-y-auto") || overlay.firstElementChild;
            if (panel) panel.scrollTop = 0;
            window.scrollTo(0, 0);
          }
        });
      });
    });
    obs.observe(document.getElementById("root"), { childList: true, subtree: true });
  })();
</script>
</body>
</html>
