<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>برامج التدريب — جيمك</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B1120" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<link rel="stylesheet" href="fonts.css" />

<style>
  :root{
    --bg-deep:#0B1120;
    --card-glass:rgba(255,255,255,0.045);
    --border-soft:rgba(255,255,255,0.09);
    --text-primary:#F8FAFC;
    --text-secondary:#94A3B8;
    --text-dim:#64748B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg-deep);}
  body{font-family:'Tajawal','Cairo',sans-serif; color:var(--text-primary); min-height:100vh;}
  h1,h2,h3,.cairo{font-family:'Cairo','Tajawal',sans-serif;}

  .bg-ambient{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(700px 420px at 12% -8%, rgba(37,99,235,0.32), transparent 60%),
      radial-gradient(650px 500px at 105% 10%, rgba(124,58,237,0.28), transparent 60%),
      var(--bg-deep);
  }
  .app{max-width:480px; margin:0 auto; padding:16px 14px 40px;}

  .top-bar{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
  .back-btn{
    width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.045); border:1px solid var(--border-soft); flex-shrink:0;
  }
  .page-title{font-size:18px; font-weight:900; margin:0;}
  .page-sub{font-size:11.5px; color:var(--text-dim); font-weight:600; margin-top:2px;}

  .glass{
    background:var(--card-glass); border:1px solid var(--border-soft); border-radius:20px;
    backdrop-filter:blur(18px) saturate(140%); -webkit-backdrop-filter:blur(18px) saturate(140%);
    box-shadow:0 8px 26px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* ===== Active program banner ===== */
  .active-banner{
    display:flex; align-items:center; gap:12px; padding:14px; margin:16px 0;
    background:linear-gradient(120deg, rgba(37,99,235,0.16), rgba(124,58,237,0.12));
  }
  .active-ic{width:40px; height:40px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#2563EB,#7C3AED);}
  .active-name{font-weight:800; font-size:13px;}
  .active-sub{font-size:11px; color:var(--text-secondary); margin-top:1px;}

  /* ===== Program cards ===== */
  .prog-card{padding:16px; margin-bottom:12px;}
  .prog-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .prog-name{font-size:15.5px; font-weight:900; margin:0;}
  .prog-days-count{font-size:10.5px; color:var(--text-dim); font-weight:700; margin-top:2px;}
  .prog-level{
    font-size:10px; font-weight:800; padding:3px 10px; border-radius:20px;
  }
  .lvl-beginner{background:rgba(34,197,94,0.14); color:#4ADE80;}
  .lvl-inter{background:rgba(251,191,36,0.14); color:#FBBF24;}
  .lvl-advanced{background:rgba(244,63,94,0.14); color:#FB7185;}

  .prog-days{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;}
  .day-chip{
    font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:20px;
    background:rgba(255,255,255,0.05); color:var(--text-secondary);
  }
  .prog-desc{font-size:12px; color:var(--text-secondary); line-height:1.6; margin-bottom:14px;}
  .prog-actions{display:flex; gap:8px;}
  .btn-apply{
    flex:1; text-align:center; padding:10px 0; font-size:12.5px; font-weight:800; color:#fff; border-radius:14px;
    background:linear-gradient(135deg,#2563EB,#7C3AED);
  }
  .btn-detail{
    padding:10px 16px; text-align:center; font-size:12.5px; font-weight:700; color:var(--text-secondary);
    background:rgba(255,255,255,0.05); border:1px solid var(--border-soft); border-radius:14px;
  }
</style>
</head>
<body>
<div class="bg-ambient"></div>
<div class="app">

  <div class="top-bar">
    <a href="profile.html" class="back-btn" style="text-decoration:none;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14 6-6 6 6 6"/></svg>
    </a>
    <div>
      <h1 class="page-title">برامج التدريب الجاهزة</h1>
      <div class="page-sub">اختار برنامج وطبّقه تلقائيًا على جدولك</div>
    </div>
  </div>

  <div class="glass active-banner" id="activeBanner" style="display:none;">
    <div class="active-ic">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div>
      <div class="active-name" id="activeName">—</div>
      <div class="active-sub" id="activeSub">—</div>
    </div>
  </div>

  <div id="programList"></div>

</div>

<script src="app-data.js"></script>
<script>
  const store = window.GymakStore;
  const LEVEL_CLASS = { "مبتدئ": "lvl-beginner", "متوسط": "lvl-inter", "متقدم": "lvl-advanced" };

  function render() {
    const programs = store.getPrograms();
    const active = store.getActiveProgram();

    const banner = document.getElementById("activeBanner");
    if (active) {
      banner.style.display = "flex";
      document.getElementById("activeName").textContent = "البرنامج الحالي: " + active.name;
      document.getElementById("activeSub").textContent = active.daysPerWeek;
    } else {
      banner.style.display = "none";
    }

    document.getElementById("programList").innerHTML = programs.map((p) => {
      const isActive = active && active.id === p.id;
      return `
      <div class="glass prog-card">
        <div class="prog-head">
          <div>
            <p class="prog-name">${p.name}</p>
            <div class="prog-days-count">${p.daysPerWeek}</div>
          </div>
          <span class="prog-level ${LEVEL_CLASS[p.level] || "lvl-beginner"}">${p.level}</span>
        </div>
        <div class="prog-days">
          ${p.dayChips.map((c) => `<span class="day-chip">${c}</span>`).join("")}
        </div>
        <p class="prog-desc">${p.desc}</p>
        <div class="prog-actions">
          <div class="btn-apply" data-id="${p.id}" style="cursor:pointer; ${isActive ? "opacity:.7;" : ""}">${isActive ? "مطبّق حاليًا ✓" : "تطبيق البرنامج"}</div>
          <div class="btn-detail" data-toggle="${p.id}" style="cursor:pointer;">التفاصيل</div>
        </div>
      </div>`;
    }).join("");
  }

  document.getElementById("programList").addEventListener("click", (e) => {
    const applyBtn = e.target.closest(".btn-apply");
    if (applyBtn) {
      store.applyProgram(applyBtn.dataset.id);
      render();
      return;
    }
    const detailBtn = e.target.closest(".btn-detail");
    if (detailBtn) {
      const p = store.getPrograms().find((x) => x.id === detailBtn.dataset.toggle);
      if (p) alert(p.name + "\n\n" + p.desc + "\n\nأيام الأسبوع: " + p.dayChips.join(" · "));
    }
  });

  render();

  if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }
</script>
</body>
</html>
